name: supagen-test-infra

services:
  postgres:
    image: postgres:17-alpine
    container_name: supagen-test-postgres
    restart: "no"
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    container_name: supagen-test-valkey
    restart: "no"
    ports:
      - "16379:6379"
    command:
      [
        "valkey-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--requirepass",
        "${VALKEY_PASSWORD}",
      ]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", 'valkey-cli -a "$${VALKEY_PASSWORD}" ping | grep PONG']
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 3s
