name: supagen-infra

services:
  postgres:
    image: postgres:17-alpine
    container_name: supagen-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - supagen-postgres-data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    container_name: supagen-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      [
        "valkey-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${VALKEY_PASSWORD}",
      ]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", 'valkey-cli -a "$${VALKEY_PASSWORD}" ping | grep PONG']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - supagen-valkey-data:/data

volumes:
  supagen-postgres-data:
    name: supagen-postgres-data
  supagen-valkey-data:
    name: supagen-valkey-data
